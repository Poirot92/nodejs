name: Zero Downtime Deploy

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # 1. Обновляем код (жёстко)
      - name: Update repo
        run: |
          cd /home/nodjs
          git fetch --all
          git reset --hard origin/master

      # 2. Определяем активный контейнер
      - name: Detect active
        run: |
          cd /home/nodjs
          if grep -q "app_blue" nginx.conf; then
            echo "NEW=app_green" >> $GITHUB_ENV
            echo "OLD=app_blue" >> $GITHUB_ENV
          else
            echo "NEW=app_blue" >> $GITHUB_ENV
            echo "OLD=app_green" >> $GITHUB_ENV
          fi

      # 3. Билдим без кэша (чтобы фронт обновлялся)
      - name: Build new image
        run: |
          cd /home/nodjs
          docker compose build --no-cache $NEW

      # 4. Поднимаем новый контейнер
      - name: Start new version
        run: |
          cd /home/nodjs
          docker compose up -d $NEW

      # 5. Ждём пока реально станет доступен
      - name: Wait for app
        run: |
          for i in {1..15}; do
            if docker exec nginx curl -s http://$NEW:3000 > /dev/null; then
              echo "App is ready"
              exit 0
            fi
            sleep 2
          done
          echo "App failed to start"
          docker logs $NEW
          exit 1

      # 6. Переключаем nginx (БЕЗ sed)
      - name: Switch nginx
        run: |
          cd /home/nodjs
          echo "
server {
    listen 80;

    location / {
        proxy_pass http://$NEW:3000;
    }
}
" > nginx.conf

          docker exec nginx nginx -t
          docker exec nginx nginx -s reload

      # 7. (опционально) останавливаем старый
      - name: Stop old
        run: |
          cd /home/nodjs
          docker compose stop $OLD

      # 8. Чистим мусор
      - name: Cleanup
        run: docker system prune -af