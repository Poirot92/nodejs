name: Zero Downtime Deploy

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # 1. Обновляем код 
      - name: Update repo
        run: |
          cd /home/nodjs
          git fetch --all
          git reset --hard origin/master

      # 2. Определяем active (blue/green)
      - name: Detect active
        run: |
          cd /home/nodjs
          if grep -q "app_blue" nginx.conf; then
            echo "NEW=app_green" >> $GITHUB_ENV
            echo "OLD=app_blue" >> $GITHUB_ENV
          else
            echo "NEW=app_blue" >> $GITHUB_ENV
            echo "OLD=app_green" >> $GITHUB_ENV
          fi

      # 3. Билдим БЕЗ КЭША (ключевой фикс)
      - name: Build new image
        run: |
          cd /home/nodjs
          docker compose build --no-cache $NEW

      # 4. Запускаем новый контейнер
      - name: Start new version
        run: |
          cd /home/nodjs
          docker compose up -d $NEW

      # 5. Ждём (можно заменить на healthcheck)
      - name: Wait for app
        run: sleep 5

      # 6. Переключаем nginx
      - name: Switch nginx
        run: |
          cd /home/nodjs
          sed -i "s/$OLD/$NEW/g" nginx.conf
          docker exec nginx nginx -s reload

      # 7. Останавливаем старый
      - name: Stop old
        run: |
          cd /home/nodjs
          docker compose stop $OLD

      # 8. Чистим мусор
      - name: Cleanup
        run: docker system prune -af