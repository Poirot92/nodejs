name: Zero Downtime Deploy

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # ОБНОВЛЯЕМ ПРОЕКТ 
      - name: Update repo
        run: |
          cd /home/nodjs
          git fetch --all
          git reset --hard origin/master

      # 1. Detect active
      - name: Detect active
        run: |
          cd /home/nodjs
          if grep -q "app_blue" nginx.conf; then
            echo "NEW=app_green" >> $GITHUB_ENV
            echo "OLD=app_blue" >> $GITHUB_ENV
          else
            echo "NEW=app_blue" >> $GITHUB_ENV
            echo "OLD=app_green" >> $GITHUB_ENV
          fi

      # 2. Start new
      - name: Start new version
        run: |
          cd /home/nodjs
          docker compose up -d --build $NEW

      - name: Wait
        run: sleep 5

      # 3. Switch nginx
      - name: Switch nginx
        run: |
          cd /home/nodjs
          sed -i "s/$OLD/$NEW/g" nginx.conf
          docker exec nginx nginx -s reload

      # 4. Stop old
      - name: Stop old
        run: |
          cd /home/nodjs
          docker compose stop $OLD

      # 5. Cleanup
      - name: Cleanup
        run: docker image prune -f