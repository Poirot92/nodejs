steps:
  # 1. Забираем код (ОБЯЗАТЕЛЬНО)
  - name: Checkout
    uses: actions/checkout@v3

  # 2. Debug (можешь потом удалить)
  - name: Debug
    run: |
      echo "WORKDIR:"
      pwd
      echo "FILES:"
      ls -la
      echo "DOCKER:"
      docker ps -a

  # 3. Поднимаем nginx (если вдруг не запущен)
  - name: Ensure nginx is running
    run: docker compose up -d nginx

  # 4. Определяем active (blue/green)
  - name: Detect active
    run: |
      if grep -q "app_blue" nginx.conf; then
        echo "NEW=app_green" >> $GITHUB_ENV
        echo "OLD=app_blue" >> $GITHUB_ENV
      else
        echo "NEW=app_blue" >> $GITHUB_ENV
        echo "OLD=app_green" >> $GITHUB_ENV
      fi

  # 5. Тянем новый образ
  - name: Pull new image
    run: docker compose pull $NEW

  # 6. Поднимаем новый контейнер
  - name: Start new version
    run: docker compose up -d $NEW

  # 7. Debug контейнера
  - name: Debug containers
    run: |
      docker ps -a
      docker logs $NEW || true

  # 8. Ждём пока приложение реально станет доступно
  - name: Healthcheck
    run: |
      echo "Waiting for $NEW..."

      for i in {1..20}; do
        if docker exec nginx curl --max-time 2 -s http://$NEW:3000 > /dev/null; then
          echo "App is ready"
          exit 0
        fi
        sleep 2
      done

      echo "App failed"
      docker logs $NEW
      exit 1

  # 9. Переключаем nginx
  - name: Switch nginx
    run: |
      echo "Switching to $NEW"

      cat <<EOF > nginx.conf