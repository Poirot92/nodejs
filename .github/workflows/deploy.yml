name: Deploy (Pull)

on:
  workflow_run:
    workflows: ["Build & Push Image"]
    types:
      - completed

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Debug
        run: |
          docker ps -a
          pwd
          ls -la

      # 1. Обновляем код
      - name: Update project
        run: |
          cd /home/nodjs
          git fetch --all
          git reset --hard origin/master

      # 2. Убеждаемся что nginx запущен
      - name: Ensure nginx is running
        run: |
          cd /home/nodjs
          docker compose up -d nginx

      # 3. Определяем active
      - name: Detect active
        run: |
          cd /home/nodjs
          if grep -q "app_blue" nginx.conf; then
            echo "NEW=app_green" >> $GITHUB_ENV
            echo "OLD=app_blue" >> $GITHUB_ENV
          else
            echo "NEW=app_blue" >> $GITHUB_ENV
            echo "OLD=app_green" >> $GITHUB_ENV
          fi

      # 4. Тянем только новый образ
      - name: Pull new image
        run: |
          cd /home/nodjs
          docker compose pull $NEW

      # 5. Поднимаем новый контейнер
      - name: Start new version
        run: |
          cd /home/nodjs
          docker compose up -d $NEW

      # 6. Healthcheck
      - name: Healthcheck
        run: |
          echo "Waiting for $NEW..."

          for i in {1..15}; do
            if docker exec nginx curl --max-time 2 -s http://$NEW:3000 > /dev/null; then
              echo "App is ready"
              exit 0
            fi
            sleep 2
          done

          echo "App failed"
          docker logs $NEW
          exit 1

      # 7. Переключаем nginx
      - name: Switch nginx
        run: |
          cd /home/nodjs

          cat <<EOF > nginx.conf
server {
    listen 80;

    location / {
        proxy_pass http://$NEW:3000;
    }
}
EOF

          docker exec nginx nginx -t
          docker exec nginx nginx -s reload

      # 8. Останавливаем старый
      - name: Stop old
        run: |
          cd /home/nodjs
          docker compose stop $OLD