version: '3.8'

services:
  app_blue:
    image: poirot92/nodjs-app:latest
    container_name: app_blue
    networks:
      - app_net

  app_green:
    image: poirot92/nodjs-app:latest
    container_name: app_green
    networks:
      - app_net

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app_net

networks:
  app_net: